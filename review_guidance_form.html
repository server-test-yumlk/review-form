<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>口コミアンケート</title>

  <script>
    /* =========================================================
      ▼ 編集エリア：基本的にここだけ変更してください
      ========================================================= */
    const EDIT_CONFIG = {
      logoImageUrl: 'images/logo.jpg',

      mainTitle: '本日はご来店<br>ありがとうございました',
      mainLead: '今後のサービス向上のため、<br>満足度をお聞かせください。',
      selectLabel: '満足度を選択してください',
      submitButtonText: '送信',
      noSelectAlertText: '満足度を選択してください。',

      googleReviewUrl: 'https://example.com/review',
      lowRatingUrl: '#improvement-form', // 低評価時は改善フォーム画面を表示
      spreadsheetPostUrl: 'https://script.google.com/macros/s/AKfycbznPeyIu63fh3cio0My46Fo6t59wvzofY6FhVx2iNQVcMo_wNlsYlA2Qj5U_NiNLuIp/exec', // 仮URL：Apps ScriptのウェブアプリURLに差し替えてください

      improvementTitle: 'ご意見をお聞かせください',
      improvementLead: 'その他、改善してほしい箇所はありましたか？',
      improvementSubmitText: '確認する',
      thanksTitle: 'ご回答ありがとうございました',
      thanksLead: 'いただいた内容は、今後のサービス改善に活用いたします。',
      closeButtonText: 'ページを閉じる',
      closeNoteText: 'ページを閉じられない場合は、ブラウザやアプリの戻るボタンで閉じてください。',

      colors: {
        main: '#1f7a5a',
        mainDark: '#165d44',
        bg: '#f6f8f7',
        text: '#222222',
        border: '#d9e1dd'
      }
    };
    /* =========================================================
      ▲ 編集エリアここまで
      ========================================================= */
  </script>

  <style>
    :root {
      --main: #1f7a5a;
      --main-dark: #165d44;
      --bg: #f6f8f7;
      --text: #222222;
      --border: #d9e1dd;
      --white: #ffffff;
      --shadow: 0 12px 30px rgba(0, 0, 0, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', 'Yu Gothic', Meiryo, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.7;
    }

    .page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }

    .card {
      width: 100%;
      max-width: 430px;
      background: var(--white);
      border-radius: 22px;
      box-shadow: var(--shadow);
      padding: 28px 22px;
    }

    .logo {
      display: none;
      width: 180px;
      max-width: 72%;
      height: auto;
      margin: 0 auto 18px;
      object-fit: contain;
    }

    .shop-name {
      margin: 0 0 6px;
      text-align: center;
      font-size: 15px;
      font-weight: 700;
      color: var(--main);
    }

    h1 {
      margin: 0;
      text-align: center;
      font-size: 24px;
      line-height: 1.35;
      letter-spacing: 0.02em;
    }

    .lead {
      margin: 14px 0 24px;
      text-align: center;
      font-size: 15px;
      color: #555;
    }

    .section-title {
      margin: 0 0 12px;
      font-size: 15px;
      font-weight: 700;
    }

    .rating-list {
      display: grid;
      gap: 10px;
      margin-bottom: 22px;
    }

    .rating-item {
      display: flex;
      align-items: center;
      min-height: 54px;
      padding: 12px 14px;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: #fff;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s, transform 0.2s;
    }

    .rating-item:has(input:checked) {
      border-color: var(--main);
      background: rgba(31, 122, 90, 0.08);
    }

    .rating-item:active {
      transform: scale(0.99);
    }

    .rating-item input {
      width: 20px;
      height: 20px;
      margin: 0 12px 0 0;
      accent-color: var(--main);
    }

    .rating-item span {
      font-size: 16px;
      font-weight: 700;
    }

    .btn {
      width: 100%;
      border: 0;
      border-radius: 999px;
      padding: 15px 18px;
      background: var(--main);
      color: #fff;
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 0.04em;
      cursor: pointer;
      box-shadow: 0 8px 18px rgba(31, 122, 90, 0.24);
      transition: background 0.2s, transform 0.2s;
    }

    .btn:hover {
      background: var(--main-dark);
    }

    .btn:active {
      transform: translateY(1px);
    }

    .btn-sub {
      margin-top: 18px;
      background: #555;
      box-shadow: none;
    }

    .btn-sub:hover {
      background: #333;
    }

    .close-note {
      display: none;
      margin: 12px 0 0;
      text-align: center;
      font-size: 13px;
      color: #666;
    }

    .form-area {
      display: grid;
      gap: 14px;
    }

    .checkbox-row {
      display: flex;
      align-items: center;
      min-height: 48px;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: #fff;
    }

    .checkbox-row input {
      width: 20px;
      height: 20px;
      margin: 0 10px 0 0;
      accent-color: var(--main);
    }

    textarea {
      width: 100%;
      min-height: 120px;
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: 12px;
      font: inherit;
      resize: vertical;
    }

    textarea:focus,
    input:focus-visible,
    button:focus-visible {
      outline: 3px solid rgba(31, 122, 90, 0.24);
      outline-offset: 2px;
    }

    .result-box {
      margin: 20px 0;
      padding: 16px;
      border-radius: 14px;
      background: rgba(31, 122, 90, 0.08);
      border: 1px solid rgba(31, 122, 90, 0.2);
    }

    .result-box p {
      margin: 0 0 8px;
      font-size: 14px;
    }

    .result-box p:last-child {
      margin-bottom: 0;
    }

    .history {
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
    }

    .history h2 {
      margin: 0 0 10px;
      font-size: 16px;
    }

    .history ul {
      margin: 0;
      padding-left: 18px;
      font-size: 14px;
    }

    .hidden {
      display: none;
    }

    @media (max-width: 360px) {
      .card {
        padding: 24px 18px;
      }

      h1 {
        font-size: 22px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section id="ratingScreen" class="card" aria-labelledby="mainTitle">
      <img id="logo" class="logo" src="" alt="店舗ロゴ" />
      <p id="shopName" class="shop-name"></p>
      <h1 id="mainTitle"></h1>
      <p id="mainLead" class="lead"></p>

      <p id="selectLabel" class="section-title"></p>
      <div class="rating-list" role="radiogroup" aria-labelledby="selectLabel">
        <label class="rating-item"><input type="radio" name="rating" value="satisfied" /><span>満足</span></label>
        <label class="rating-item"><input type="radio" name="rating" value="somewhat-satisfied" /><span>やや満足</span></label>
        <label class="rating-item"><input type="radio" name="rating" value="normal" /><span>普通</span></label>
        <label class="rating-item"><input type="radio" name="rating" value="somewhat-dissatisfied" /><span>やや不満</span></label>
        <label class="rating-item"><input type="radio" name="rating" value="dissatisfied" /><span>不満</span></label>
      </div>

      <button id="mainSubmitButton" class="btn" type="button" onclick="submitRating()"></button>
    </section>

    <section id="improvementScreen" class="card hidden" aria-labelledby="improvementTitle">
      <img id="improvementLogo" class="logo" src="" alt="店舗ロゴ" />
      <p id="improvementShopName" class="shop-name"></p>
      <h1 id="improvementTitle"></h1>
      <p id="improvementLead" class="lead"></p>

      <div class="form-area">
        <label class="checkbox-row"><input id="priceCheck" type="checkbox" value="価格" /><span>価格</span></label>
        <label class="checkbox-row"><input id="serviceCheck" type="checkbox" value="接客" /><span>接客</span></label>
        <textarea id="freeText" placeholder="自由記入欄"></textarea>
        <button id="improvementSubmitButton" class="btn" type="button" onclick="submitImprovement()"></button>
      </div>
    </section>

    <section id="thanksScreen" class="card hidden" aria-labelledby="thanksTitle">
      <img id="thanksLogo" class="logo" src="" alt="店舗ロゴ" />
      <p id="thanksShopName" class="shop-name"></p>
      <h1 id="thanksTitle"></h1>
      <p id="thanksLead" class="lead"></p>
      <button id="closeButton" class="btn btn-sub" type="button" onclick="closePage()"></button>
      <p id="closeNote" class="close-note"></p>
    </section>
  </main>

  <script>
    const positiveRatings = ['satisfied', 'somewhat-satisfied', 'normal'];
    let selectedRating = '';
    const STORAGE_KEY = 'reviewImprovementData';

    function applyConfig() {
      document.documentElement.style.setProperty('--main', EDIT_CONFIG.colors.main);
      document.documentElement.style.setProperty('--main-dark', EDIT_CONFIG.colors.mainDark);
      document.documentElement.style.setProperty('--bg', EDIT_CONFIG.colors.bg);
      document.documentElement.style.setProperty('--text', EDIT_CONFIG.colors.text);
      document.documentElement.style.setProperty('--border', EDIT_CONFIG.colors.border);

      document.title = '口コミアンケート';
      setText('shopName', '');
      setText('improvementShopName', '');
      setText('thanksShopName', '');
      setHtml('mainTitle', EDIT_CONFIG.mainTitle);
      setHtml('mainLead', EDIT_CONFIG.mainLead);
      setText('selectLabel', EDIT_CONFIG.selectLabel);
      setText('mainSubmitButton', EDIT_CONFIG.submitButtonText);
      setText('improvementTitle', EDIT_CONFIG.improvementTitle);
      setText('improvementLead', EDIT_CONFIG.improvementLead);
      setText('improvementSubmitButton', EDIT_CONFIG.improvementSubmitText);
      setText('thanksTitle', EDIT_CONFIG.thanksTitle);
      setText('thanksLead', EDIT_CONFIG.thanksLead);
      setText('closeButton', EDIT_CONFIG.closeButtonText);
      setText('closeNote', EDIT_CONFIG.closeNoteText);

      const logoIds = ['logo', 'improvementLogo', 'thanksLogo'];
      const shopNameIds = ['shopName', 'improvementShopName', 'thanksShopName'];
      if (EDIT_CONFIG.logoImageUrl) {
        logoIds.forEach((id) => {
          const logo = document.getElementById(id);
          logo.src = EDIT_CONFIG.logoImageUrl;
          logo.alt = '店舗ロゴ';
          logo.style.display = 'block';
        });
        shopNameIds.forEach((id) => {
          document.getElementById(id).style.display = 'none';
        });
      }
    }

    function setText(id, text) {
      document.getElementById(id).textContent = text;
    }

    function setHtml(id, html) {
      document.getElementById(id).innerHTML = html;
    }

    function submitRating() {
      const checked = document.querySelector('input[name="rating"]:checked');
      if (!checked) {
        alert(EDIT_CONFIG.noSelectAlertText);
        return;
      }

      selectedRating = checked.value;

      if (positiveRatings.includes(checked.value)) {
        location.href = EDIT_CONFIG.googleReviewUrl;
      } else {
        location.hash = EDIT_CONFIG.lowRatingUrl;
        showScreen('improvementScreen');
      }
    }

    async function submitImprovement() {
      const button = document.getElementById('improvementSubmitButton');
      const originalText = button.textContent;
      button.disabled = true;
      button.textContent = '送信中...';

      const payload = {
        rating: selectedRating || 'low-rating',
        price: document.getElementById('priceCheck').checked,
        service: document.getElementById('serviceCheck').checked,
        comment: document.getElementById('freeText').value.trim(),
        userAgent: navigator.userAgent,
        pageUrl: location.href
      };

      try {
        await fetch(EDIT_CONFIG.spreadsheetPostUrl, {
          method: 'POST',
          mode: 'no-cors',
          headers: {
            'Content-Type': 'text/plain;charset=utf-8'
          },
          body: JSON.stringify(payload)
        });

        showScreen('thanksScreen');
        location.hash = '#thanks';
      } catch (error) {
        alert('送信できませんでした。時間をおいて再度お試しください。');
        button.disabled = false;
        button.textContent = originalText;
      }
    }

    function closePage() {
      window.close();
      setTimeout(() => {
        document.getElementById('closeNote').style.display = 'block';
      }, 200);
    }

    function loadData() {
      const defaultData = { priceCount: 0, serviceCount: 0, freeTextHistory: [] };
      try {
        return JSON.parse(localStorage.getItem(STORAGE_KEY)) || defaultData;
      } catch (error) {
        return defaultData;
      }
    }

    function saveData(data) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    }

    function showScreen(screenId) {
      ['ratingScreen', 'improvementScreen', 'thanksScreen'].forEach((id) => {
        document.getElementById(id).classList.toggle('hidden', id !== screenId);
      });
    }

    function routeByHash() {
      if (location.hash === '#improvement-form') {
        showScreen('improvementScreen');
      } else if (location.hash === '#thanks') {
        showScreen('thanksScreen');
      } else {
        showScreen('ratingScreen');
      }
    }

    applyConfig();
    routeByHash();
    window.addEventListener('hashchange', routeByHash);
  </script>
</body>
</html>
